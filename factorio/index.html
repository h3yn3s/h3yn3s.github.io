<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time since Factorio: Space Age Release</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            flex-direction: column;
        }
        #title {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        #countdown {
            font-size: 3em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="title">Time since Factorio: Space Age Release</div>
    <div id="countdown"></div>

    <script>
        function updateCountdown() {
            const now = new Date().getTime();
            const releaseDate = new Date('October 21, 2024 00:00:00').getTime();
            const distance = now - releaseDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            const minutes = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const seconds = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
            const milliseconds = String(Math.floor((distance % 1000) / 10)).padStart(2, '0');

            const countdownText = `${days}d ${hours}h ${minutes}m ${seconds}s ${milliseconds}ms`;
            document.getElementById('countdown').innerHTML = countdownText;
            document.title = countdownText;


            requestAnimationFrame(updateCountdown);
        }

        requestAnimationFrame(updateCountdown);
    </script>
</body>
</html>
