<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>h3yn3s</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-8">
    <h1 class="text-2xl font-bold mb-6">h3yn3s</h1>
    <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 max-w-3xl"></div>
    <script>
      fetch("./cards.json")
        .then((r) => r.json())
        .then((cards) => {
          const container = document.getElementById("cards");
          cards.forEach((card) => {
            const a = document.createElement("a");
            a.href = card.link;
            a.className = "flex items-center border rounded p-4 hover:bg-gray-50";
            if (card.svg) {
              const icon = document.createElement("span");
              icon.className = "shrink-0";
              icon.innerHTML = card.svg;
              a.appendChild(icon);
            }
            const textWrap = document.createElement("span");
            textWrap.className = "flex-1 text-center";
            const title = document.createElement("span");
            title.className = "block";
            title.textContent = card.title;
            textWrap.appendChild(title);
            if (card.desc) {
              const desc = document.createElement("span");
              desc.className = "block text-xs text-gray-400 mt-1";
              desc.textContent = card.desc;
              textWrap.appendChild(desc);
            }
            a.appendChild(textWrap);
            container.appendChild(a);
          });
        });
    </script>
  </body>
</html>
